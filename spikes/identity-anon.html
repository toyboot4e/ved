<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<title>Anonymous ruby container: sibling leaves without a wrapper</title>
<style>
  body { font-family: serif; font-size: 24px; margin: 16px; }
  h2 { font-size: 13px; color: #666; font-family: sans-serif; margin: 4px 0; }
  .rt { display: ruby-text; font-size: 0.5em; color: #c00; }
  .d  { font-size: 0; }
</style>
</head>
<body>
<section id="anon">
  <h2>ruby-text leaf as a direct sibling of plain inline leaves (Slate-like flat structure)</h2>
  <p>字は<span class="d">|</span><span>漢</span><span class="d">(</span><span class="rt">かん</span><span class="d">)</span>字です</p>
</section>
</body>
</html>
