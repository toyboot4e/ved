<!doctype html>
<!-- Spike: number every VISUAL line (wrap fragment), not every paragraph.
     CSS counters count <p>s; visual lines need measuring. For each paragraph,
     Range.getClientRects() yields one rect per line box; group them by the
     block-axis position (a column in vertical-rl) to get visual lines, and
     drop a number in the gutter at each one's start. Driver screenshots it. -->
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <style>
      :root { --cell: 18px; --chars: 12; --line-length: calc(var(--chars) * var(--cell)); --gutter: 2.2em; }
      body { margin: 16px; font-family: serif; }
      .box {
        writing-mode: vertical-rl;
        font-size: var(--cell);
        line-height: 1.5;
        border: 2px solid #333;
        block-size: max-content;
        margin-inline-start: var(--gutter); /* room for the gutter on the start side */
        position: relative;
      }
      .box.horizontal { writing-mode: horizontal-tb; }
      .box > p {
        margin: 0;
        inline-size: var(--line-length); /* lines wrap at N cells, like the editor */
        word-break: break-all;
        overflow-wrap: anywhere;
      }
      /* A measured visual-line number, placed in the gutter by JS. */
      .vln {
        position: absolute;
        font-size: 0.6em;
        color: #aaa;
        text-combine-upright: all;
        pointer-events: none;
        user-select: none;
      }
    </style>
  </head>
  <body>
    <div class="box" id="v">
      <p>一二三四五六七八九十壱弐参四五六七八九拾甲乙丙丁戊己</p>
      <p>短い行</p>
      <p>cvxzvczxvzcvxzvczxvzcvxzvczxvzcvxzvczxvz</p>
    </div>

    <script>
      // For each paragraph, find its visual lines and number each one.
      const numberVisualLines = (box, vertical) => {
        box.querySelectorAll('.vln').forEach((n) => n.remove());
        const boxRect = box.getBoundingClientRect();
        const range = document.createRange();
        let n = 0;
        for (const p of box.querySelectorAll('p')) {
          range.selectNodeContents(p);
          // Group rects into visual lines by the block-axis coordinate: a column
          // (distinct left) in vertical-rl, a row (distinct top) in horizontal.
          const key = (r) => Math.round(vertical ? r.left : r.top);
          const lines = new Map();
          for (const r of range.getClientRects()) {
            const k = key(r);
            const cur = lines.get(k);
            // Keep the line's inline-START (smallest inline coord) for placement.
            if (!cur) lines.set(k, r);
            else if ((vertical ? r.top : r.left) < (vertical ? cur.top : cur.left)) lines.set(k, r);
          }
          // Order visual lines in reading order (RTL columns, or TTB rows).
          const ordered = [...lines.entries()].sort((a, b) => (vertical ? b[0] - a[0] : a[0] - b[0]));
          for (const [, r] of ordered) {
            n += 1;
            const el = document.createElement('span');
            el.className = 'vln';
            el.textContent = String(n);
            // Place in the gutter at the visual line's start corner.
            if (vertical) {
              el.style.top = `${r.top - boxRect.top - 16}px`; // just before the column top
              el.style.right = `${boxRect.right - r.right}px`; // align to the column's right edge
            } else {
              el.style.left = `${r.left - boxRect.left - 18}px`;
              el.style.top = `${r.top - boxRect.top}px`;
            }
            box.appendChild(el);
          }
        }
      };

      numberVisualLines(document.getElementById('v'), true);
      window.spikeReady = true;
    </script>
  </body>
</html>
