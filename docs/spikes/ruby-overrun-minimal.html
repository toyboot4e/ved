<!doctype html>
<!-- Minimal repro (no ved): in a fixed inline-size whose width is an exact
     multiple of an atom width, a <ruby> atom at the boundary OVERHANGS instead
     of wrapping — while plain characters in the same box wrap correctly.
     Both rows hold 10 atoms; the box fits exactly 5. Expected: each row wraps
     to two columns of 5. Bug: the ruby row keeps 6 in the first column. -->
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <style>
      body { margin: 24px; }
      .box {
        writing-mode: vertical-rl;
        font-size: 20px;
        line-height: 1;
        inline-size: 100px; /* = 5 atoms of 20px base */
        border: 1px solid #333;
        margin-inline-start: 40px;
        white-space: normal;
      }
      ruby { ruby-position: over; }
      rt { font-size: 0.5em; }
      .delim { font-size: 0; } /* how ved hides the |,(,) markup */
    </style>
  </head>
  <body>
    <!-- ved's exact ruby DOM: base "ルビ" (2 cells) wrapped in .rubyBase, with
         the |,(reading) markup present but font-size:0. 5 rubies fit (40px each
         in a 200px box). -->
    <div class="box" id="ruby" style="inline-size: 200px">
      <!-- prettier-ignore -->
      <span></span
      ><ruby class="rubyWrap"><span class="rubyBase"><span class="delim">|</span>ルビ<span class="delim">(ruby)</span></span><rt>ruby</rt></ruby
      ><ruby class="rubyWrap"><span class="rubyBase"><span class="delim">|</span>ルビ<span class="delim">(ruby)</span></span><rt>ruby</rt></ruby
      ><ruby class="rubyWrap"><span class="rubyBase"><span class="delim">|</span>ルビ<span class="delim">(ruby)</span></span><rt>ruby</rt></ruby
      ><ruby class="rubyWrap"><span class="rubyBase"><span class="delim">|</span>ルビ<span class="delim">(ruby)</span></span><rt>ruby</rt></ruby
      ><ruby class="rubyWrap"><span class="rubyBase"><span class="delim">|</span>ルビ<span class="delim">(ruby)</span></span><rt>ruby</rt></ruby
      ><ruby class="rubyWrap"><span class="rubyBase"><span class="delim">|</span>ルビ<span class="delim">(ruby)</span></span><rt>ruby</rt></ruby
      ><ruby class="rubyWrap"><span class="rubyBase"><span class="delim">|</span>ルビ<span class="delim">(ruby)</span></span><rt>ruby</rt></ruby
      ><ruby class="rubyWrap"><span class="rubyBase"><span class="delim">|</span>ルビ<span class="delim">(ruby)</span></span><rt>ruby</rt></ruby
      ><ruby class="rubyWrap"><span class="rubyBase"><span class="delim">|</span>ルビ<span class="delim">(ruby)</span></span><rt>ruby</rt></ruby
      ><ruby class="rubyWrap"><span class="rubyBase"><span class="delim">|</span>ルビ<span class="delim">(ruby)</span></span><rt>ruby</rt></ruby
      ><ruby class="rubyWrap"><span class="rubyBase"><span class="delim">|</span>ルビ<span class="delim">(ruby)</span></span><rt>ruby</rt></ruby
      ><ruby class="rubyWrap"><span class="rubyBase"><span class="delim">|</span>ルビ<span class="delim">(ruby)</span></span><rt>ruby</rt></ruby>
    </div>
    <div class="box" id="plain" style="inline-size: 200px">ルビルビルビルビルビルビルビルビルビルビ</div>

    <script>
      // Build a box of 12 ved-structured rubies; opts toggle candidate fixes.
      const makeBox = (opts = {}) => {
        const box = document.createElement('div');
        box.className = 'box';
        box.style.inlineSize = '200px';
        if (opts.breakAll) box.style.wordBreak = 'break-all';
        for (let i = 0; i < 12; i++) {
          if (opts.between && i > 0) box.appendChild(document.createTextNode('​')); // ZWSP BETWEEN rubies
          const ru = document.createElement('ruby');
          ru.className = 'rubyWrap';
          const zwsp = opts.zwsp ? '​' : '';
          ru.innerHTML =
            `<span class="rubyBase">${zwsp}<span class="delim">|</span>ルビ` +
            `<span class="delim">(ruby)</span></span><rt>ruby</rt>`;
          box.appendChild(ru);
        }
        document.body.appendChild(box);
        const xs = [...box.querySelectorAll('ruby')].map((k) => Math.round(k.getBoundingClientRect().left));
        const colX = Math.max(...xs);
        return xs.filter((x) => x === colX).length; // first column ruby count (5 = correct)
      };
      window.__result = {
        baseline: makeBox(), // ved's structure → 6 (overhang)
        breakAll: makeBox({ breakAll: true }), // word-break: break-all
        between: makeBox({ between: true }), // ZWSP between rubies
        both: makeBox({ breakAll: true, zwsp: true }),
      };
      window.spikeReady = true;
    </script>
  </body>
</html>
