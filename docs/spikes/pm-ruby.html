<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<title>ProseMirror spike: identity ruby + vertical-rl + pagination</title>
<style>
  body { font-family: serif; margin: 16px; }
  #editor { border: 1px solid #999; width: 820px; height: 360px; overflow: auto; }
  .ProseMirror { outline: none; font-family: serif; }
  .ProseMirror p { margin: 0; }

  /* identity-model ruby from PM decorations: <ruby> wraps the editable base,
     dup <rt> widget is the annotation, markup hidden but caret-addressable. */
  .delim, .rt { font-size: 0; }
  .rubyWrap > rt.dup { font-size: 0.5em; color: #444; }
</style>
</head>
<body>
  <div id="editor"></div>
  <script type="module" src="./pm-ruby.bundle.js"></script>
</body>
</html>
