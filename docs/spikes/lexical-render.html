<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<title>Lexical migration step 2: rendering + the four appear policies</title>
<style>
  html, body, #root { margin: 0; height: 100%; }
  .lexEditor { font-family: serif; font-size: 24px; padding: 12px; }
  .lexContent {
    writing-mode: vertical-rl;
    height: 320px;
    outline: none;
    line-height: 1.8;
  }

  /* Collapsed ruby (default): markup hidden, the read-only duplicate <rt>
     renders the annotation. Identical to the Slate rendering. */
  .rubyWrap .delim,
  .rubyWrap span.rt { display: none; }
  .rubyWrap > rt.dup { font-size: 0.5em; }

  /* Expanded ruby: show the syntax (gray), hide the duplicate annotation.
     Which rubies expand is chosen by the appear-policy class on the root,
     combined with .activePara / .rubyActive set from the selection. */
  .appear-showall .rubyWrap .delim,
  .appear-showall .rubyWrap span.rt,
  .appear-paragraph .activePara .rubyWrap .delim,
  .appear-paragraph .activePara .rubyWrap span.rt,
  .appear-char .rubyWrap.rubyActive .delim,
  .appear-char .rubyWrap.rubyActive span.rt {
    display: inline;
    color: #808080;
  }
  .appear-showall .rubyWrap > rt.dup,
  .appear-paragraph .activePara .rubyWrap > rt.dup,
  .appear-char .rubyWrap.rubyActive > rt.dup {
    display: none;
  }
</style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="./lexical-render.bundle.js"></script>
</body>
</html>
