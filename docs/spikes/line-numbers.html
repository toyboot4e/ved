<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<title>Spike: line numbers per line in horizontal / vertical-rl / multicol</title>
<style>
  body { font-family: serif; margin: 16px; display: flex; gap: 24px; align-items: flex-start; }
  .box { border: 1px solid #999; }

  /* The editor content. ved: a paragraph IS a logical line, so number the
     <p>s with a CSS counter — no JS, stable across edits. */
  .content { font-size: 20px; line-height: 1.8; counter-reset: line; position: relative; }
  .content p { margin: 0; position: relative; }

  /* Line number: an absolutely-positioned ::before pinned to the line's
     inline-START edge (left in horizontal, TOP in vertical-rl, via logical
     props), forced horizontal so digits never stack. It lives in a reserved
     gutter (padding-inline-start on the content), so it never shifts the text. */
  .content p::before {
    counter-increment: line;
    content: counter(line);
    position: absolute;
    inset-inline-start: -2.4em;       /* into the gutter */
    inset-block-start: 0;             /* aligned to the column/row start */
    writing-mode: horizontal-tb;       /* digits stay horizontal in vertical-rl */
    text-orientation: mixed;
    font-size: 0.5em;
    color: #aaa;
    width: 2em;
    text-align: end;
    user-select: none;
  }

  /* HORIZONTAL: gutter on the left. */
  .horizontal {
    writing-mode: horizontal-tb;
    width: 280px; height: 240px; overflow: auto;
    padding-inline-start: 2.8em;
  }

  /* VERTICAL-RL continuous: gutter at the top; lines (columns) tile right→left. */
  .vertical {
    writing-mode: vertical-rl;
    width: 280px; height: 320px; overflow: auto;
    padding-inline-start: 2.8em;       /* = top gutter in vertical-rl */
  }

  /* VERTICAL-RL multicol (paged): same, but columns paginate. */
  .multicol {
    writing-mode: vertical-rl;
    width: 280px; height: 360px; overflow-y: auto;
    padding-inline-start: 2.8em;
    column-width: 300px; column-gap: 20px;
    box-sizing: border-box;
  }
</style>
</head>
<body>
  <div class="box"><div class="content horizontal" id="h"></div></div>
  <div class="box"><div class="content vertical" id="v"></div></div>
  <div class="box"><div class="content multicol" id="m"></div></div>
  <script>
    const lines = Array.from({ length: 16 }, (_, i) => `第${i + 1}行目のテキストです`);
    for (const id of ['h', 'v', 'm']) {
      const el = document.getElementById(id);
      for (const t of lines) { const p = document.createElement('p'); p.textContent = t; el.appendChild(p); }
    }
    window.spikeReady = true;
  </script>
</body>
</html>
