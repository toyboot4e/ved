name: CI

on:
  push:
    branches: [main]
  pull_request:

# CI only reads the repo; no token write scopes needed.
permissions:
  contents: read

# Cancel superseded runs on the same ref
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Install Nix
        uses: cachix/install-nix-action@8aa03977d8d733052d78f4e008a241fd1dbf36b3 # v31.10.6
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}

      # The dev shell (flake.nix) provides node, pnpm, biome, and just.
      # ELECTRON_SKIP_BINARY_DOWNLOAD: `just ci` builds and type-checks but
      # never launches Electron, so the ~100 MB binary is not needed here.
      - name: just ci
        run: nix develop --command bash -c "pnpm install --frozen-lockfile && just ci"
        env:
          ELECTRON_SKIP_BINARY_DOWNLOAD: "1"
