packages:
  - editor
  - desktop
  - vim
  - web

# electron-vite resolves `electron/package.json` from its own location in the
# shared pnpm store, so `electron` must be visible at the workspace root even
# though it's declared only by @ved/desktop. Hoist ONLY electron — NOT a blanket
# node-linker=hoisted, which would flatten everything and let desktop/web resolve
# prosemirror, defeating the scope boundary (ADR-0009).
publicHoistPattern:
  - electron

# Dependency build scripts are blocked unless acknowledged here.
# electron@42 no longer ships a postinstall at all — its binary download
# runs from this project's own postinstall instead. The others work without
# their build scripts (platform binaries ship as optional dependencies;
# electron-winstaller is Windows-only). node-pty compiles its native addon
# in its install script (no prebuilt binaries), so it must run.
allowBuilds:
  electron: true
  esbuild: false
  '@parcel/watcher': false
  electron-winstaller: false
  node-pty: true
  # puppeteer's install script only pre-downloads its Chrome binary; whatever
  # needs one can fetch it on demand (npx puppeteer browsers install chrome),
  # so the script stays off like the other binary-shippers.
  puppeteer: false
minimumReleaseAgeExclude:
  - '@types/node@25.9.3'
  - '@typescript/typescript-aix-ppc64@7.0.2'
  - '@typescript/typescript-darwin-arm64@7.0.2'
  - '@typescript/typescript-darwin-x64@7.0.2'
  - '@typescript/typescript-freebsd-arm64@7.0.2'
  - '@typescript/typescript-freebsd-x64@7.0.2'
  - '@typescript/typescript-linux-arm64@7.0.2'
  - '@typescript/typescript-linux-arm@7.0.2'
  - '@typescript/typescript-linux-loong64@7.0.2'
  - '@typescript/typescript-linux-mips64el@7.0.2'
  - '@typescript/typescript-linux-ppc64@7.0.2'
  - '@typescript/typescript-linux-riscv64@7.0.2'
  - '@typescript/typescript-linux-s390x@7.0.2'
  - '@typescript/typescript-linux-x64@7.0.2'
  - '@typescript/typescript-netbsd-arm64@7.0.2'
  - '@typescript/typescript-netbsd-x64@7.0.2'
  - '@typescript/typescript-openbsd-arm64@7.0.2'
  - '@typescript/typescript-openbsd-x64@7.0.2'
  - '@typescript/typescript-sunos-x64@7.0.2'
  - '@typescript/typescript-win32-arm64@7.0.2'
  - '@typescript/typescript-win32-x64@7.0.2'
  - typescript@7.0.2
